<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Price Predictor | Smart Estimates</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Mobile Price <span class="gradient-text">Predictor</span></h1>
            <p>Get accurate market price estimates for mobile phones in Sri Lanka.</p>
        </header>

        <main class="glass-card">
            <form id="predictionForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="brand">Brand</label>
                        <select id="brand" required>
                            <option value="" disabled selected>Select Brand</option>
                            {% for brand in options.brands %}
                            <option value="{{ brand }}">{{ brand }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="brand_version">Brand Version</label>
                        <select id="brand_version" required>
                            <option value="" disabled selected>Select Brand First</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="condition">Condition</label>
                        <select id="condition" required>
                            {% for cond in options.conditions %}
                            <option value="{{ cond }}" {% if cond=='Used' %}selected{% endif %}>{{ cond }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="storage_gb">Storage (GB)</label>
                        <select id="storage_gb" required>
                            <option value="" disabled selected>Select Brand First</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="location">Location</label>
                        <select id="location" required>
                            {% for loc in options.locations %}
                            <option value="{{ loc }}" {% if loc=='Colombo' %}selected{% endif %}>{{ loc }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <button type="submit" id="predictBtn">
                    <span class="btn-text">Predict Price</span>
                    <div class="loader" id="btnLoader" style="display: none;"></div>
                </button>
            </form>

            <div id="resultContainer" class="result-container" style="display: none;">
                <h3>Estimated Market Price</h3>
                <div class="price-display">
                    <span class="currency">LKR</span>
                    <span id="predictedPrice" class="price-value">0</span>
                </div>
                <p class="disclaimer">Based on current ikman.lk market trends.</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Mobile Intelligence Lab</p>
        </footer>
    </div>

    <script>
        // Store the brand mapping from the backend
        const specMapping = {{ options.mapping | tojson }};

        // Handle Brand Change
        document.getElementById('brand').addEventListener('change', function () {
            const brand = this.value;
            const specs = specMapping[brand] || { versions: [], storages: [] };

            // 1. Update Versions
            const versionSelect = document.getElementById('brand_version');
            versionSelect.innerHTML = '<option value="" disabled selected>Select Version</option>';
            specs.versions.forEach(v => {
                versionSelect.innerHTML += `<option value="${v}">${v}</option>`;
            });

            // 2. Update Storages
            const storageSelect = document.getElementById('storage_gb');
            storageSelect.innerHTML = '<option value="" disabled selected>Select Storage</option>';
            specs.storages.forEach(s => {
                const label = s < 1024 ? `${s}GB` : `${s / 1024}TB`;
                storageSelect.innerHTML += `<option value="${s}">${label}</option>`;
            });
        });

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get Elements
            const btn = document.getElementById('predictBtn');
            const loader = document.getElementById('btnLoader');
            const btnText = btn.querySelector('.btn-text');
            const resultDiv = document.getElementById('resultContainer');
            const priceVal = document.getElementById('predictedPrice');

            // 1. Validation Logic
            const fields = ['brand', 'brand_version', 'condition', 'storage_gb', 'location'];
            const missing = fields.filter(f => !document.getElementById(f).value);

            if (missing.length > 0) {
                alert('Please select all fields before predicting.');
                return;
            }

            // UI Feedback Start
            btn.disabled = true;
            btnText.style.opacity = '0.5';
            loader.style.display = 'inline-block';
            resultDiv.style.opacity = '0.3';

            const payload = {
                brand: document.getElementById('brand').value,
                brand_version: document.getElementById('brand_version').value,
                condition: document.getElementById('condition').value,
                location: document.getElementById('location').value,
                storage_gb: document.getElementById('storage_gb').value || 0
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // Animate the price number
                    animateValue(priceVal, 0, data.prediction, 800);
                    resultDiv.style.display = 'block';
                    resultDiv.style.opacity = '1';
                    resultDiv.classList.add('fade-in');
                } else {
                    alert('Prediction Error: ' + (data.message || 'Unknown error occurred.'));
                }
            } catch (err) {
                alert('Connection Error: Please ensure the server (app.py) is running.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btnText.style.opacity = '1';
                loader.style.display = 'none';
                resultDiv.style.opacity = '1';
            }
        });

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = Math.floor(progress * (end - start) + start);
                obj.innerHTML = current.toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>

</html>
